<!DOCTYPE html>
<html>
<head>
    <title>DRF Snippets</title>
</head>

<body>

<h1>Snippets</h1>
<ul id="snippets"></ul>

<script>
fetch("https://drf-9v1q.onrender.com/snippets/")
.then(res => res.json())
.then(data => {
    const list = document.getElementById("snippets")

    data.forEach(snippet => {
        const li = document.createElement("li")
        li.innerText = snippet.title + " - " + snippet.code
        list.appendChild(li)
    })
})
</script>

</body>
</html>
